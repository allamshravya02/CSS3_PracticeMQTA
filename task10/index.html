<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Responsive card</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <style>
        .ball{
            width:50px;
            height:50px;
            border: 5px solid #f3f3f3;
            background-color: #3498db;
            border-radius: 50%;
            position:absolute;
            animation: loadball 2s linear infinite;
        }
        @keyframes loadball {
            0% {left:0; }
            50%{left:calc(100%-50px);}
            100% { left:0; }
        }
    </style>
<body>

    <div class="ball"></div>
</body>
</html>
