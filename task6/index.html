<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Button</title>
    
</head>
<style>
    .card{
        margin:0;
        padding:20px;
        width:200px;
        height:200px;
        background-color:rgb(202, 225, 233);
        transition:smooth 1s;
    }
    h2,h3{
        text-align:center;
    }
    .card:hover{
        width:250px;
        height:250px;
        background-color:rgb(245, 193, 255);
    }
</style>
<body>
    <div class="card">
        <h2>AANY INDIAN CARD</h2>
        <h3>Details</h3>
        <pre> Name:HYlesso
 DOB:23-12-1989
 Country:India
        </pre>
    </div>
</body>
