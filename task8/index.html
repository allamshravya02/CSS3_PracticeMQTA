<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Responsive Gallery</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <style>
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition:smooth;
        }

        img {
            width: 400px;
            height: 500px;
            object-fit: cover;
        }
        .container:hover{
            transform: scale(1.2);
        }
    </style>
    <body>
        <div class="container">
            <h2>Image to Transform</h2>
         <img src="D:/id_image.jpg" alt="Profile Image">
        </div>
    </body>
</html>
